<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · SPPU Question Bank</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-split">
    <div class="auth-left">
      <a href="/" class="auth-logo"><span>SPPU</span> QB</a>
      <div class="auth-left-content">
        <h1>Join<br /><em>Thousands</em><br />of Students.</h1>
        <p>Free access to the complete SPPU exam archive.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-box">
        <h2>Create Account</h2>
        <p class="auth-sub">Register with your email to get instant access.</p>

        <div id="toast" class="toast" role="alert"></div>

        <form id="register-form" novalidate>
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your Name" autocomplete="name" />
            <span class="field-err" id="err-name"></span>
          </div>
          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
            <span class="field-err" id="err-email"></span>
          </div>
          <div class="field">
            <label for="password">Password <small>(min 6 chars)</small></label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" />
              <button type="button" class="eye-btn" id="toggle-pw">👁</button>
            </div>
            <span class="field-err" id="err-password"></span>
          </div>
          <div class="field">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" />
            <span class="field-err" id="err-confirm"></span>
          </div>

          <button type="submit" class="btn btn-accent btn-full" id="register-btn">
            <span class="btn-label">Create Account</span>
            <span class="btn-spin" hidden>⟳</span>
          </button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      clearErrors();
      let valid = true;
      if (!name)              { setErr('err-name', 'Name is required.'); valid = false; }
      if (!email)             { setErr('err-email', 'Email is required.'); valid = false; }
      if (password.length < 6){ setErr('err-password', 'Minimum 6 characters.'); valid = false; }
      if (password !== confirm){ setErr('err-confirm', 'Passwords do not match.'); valid = false; }
      if (!valid) return;

      setBusy(true, 'register-btn');
      try {
        const res  = await fetch('/api/auth/register', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!data.success) { showToast(data.message, 'error'); return; }

        showToast('Account created! Redirecting to login…', 'success');
        setTimeout(() => window.location.href = '/login', 1500);
      } catch {
        showToast('Network error.', 'error');
      } finally {
        setBusy(false, 'register-btn');
      }
    });
  </script>
</body>
</html>
